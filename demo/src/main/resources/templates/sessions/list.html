<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sessions</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Climbing Sessions</h1>

        <div class="nav-links">
            <a class="btn btn-secondary" th:href="@{/}">Home</a>
            <a class="btn" th:href="@{/dashboard}">Dashboard</a>
            <a class="btn btn-link" th:href="@{/sessions/new}">Create New Session</a>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Gym</th>
                    <th>Notes</th>
                    <th>Open</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(sessions)}">
                    <td colspan="5">No sessions recorded yet.</td>
                </tr>
                <tr th:each="sessionItem : ${sessions}">
                    <td th:text="${sessionItem.id}"></td>
                    <td th:text="${sessionItem.sessionDate}"></td>
                    <td th:text="${sessionItem.gym.displayName}"></td>
                    <td th:text="${sessionItem.notes}"></td>
                    <td>
                        <a class="btn btn-link"
                           th:href="@{/sessions/{id}(id=${sessionItem.id})}">
                            Open
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
